<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhopal Plan? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 80px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
                margin: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .emoji {
                font-size: 3rem;
            }

            button {
                padding: 15px 35px;
                font-size: 1.2rem;
            }

            .buttons {
                height: 100px;
            }

            .celebration h1 {
                font-size: 2.5rem;
            }

            .celebration p {
                font-size: 1.3rem;
            }
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .emoji {
            font-size: 4rem;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 40px;
            position: relative;
            height: 80px;
        }

        button {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #yesBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        #noBtn {
            background: #f0f0f0;
            color: #666;
            position: absolute;
            transition: all 0.1s ease;
        }

        .celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .celebration.show {
            display: flex;
        }

        .celebration h1 {
            color: white;
            font-size: 4rem;
            animation: slideIn 0.8s ease;
        }

        .celebration p {
            color: white;
            font-size: 2rem;
            margin-top: 20px;
            animation: slideIn 1s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            animation: float 3s ease-in infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚂</div>
        <h1>Tuh Bhopal aarhi hain na? 🥺</h1>
        <div class="buttons">
            <button id="yesBtn">Yes! ✨</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <div class="hearts" id="hearts"></div>
        <h1>Yayyy! 🎉</h1>
        <p>I knew you'd say yes! 💕</p>
        <p style="font-size: 1.5rem; margin-top: 10px;">See you in Bhopal! 🎊</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const celebration = document.getElementById('celebration');
        const heartsContainer = document.getElementById('hearts');

        // Make No button run away from cursor
        noBtn.addEventListener('mousemove', function(e) {
            const rect = noBtn.getBoundingClientRect();
            const btnCenterX = rect.left + rect.width / 2;
            const btnCenterY = rect.top + rect.height / 2;

            const mouseX = e.clientX;
            const mouseY = e.clientY;

            const distance = Math.sqrt(
                Math.pow(mouseX - btnCenterX, 2) +
                Math.pow(mouseY - btnCenterY, 2)
            );

            // If cursor is within 150px, move the button
            if (distance < 150) {
                const angle = Math.atan2(btnCenterY - mouseY, btnCenterX - mouseX);
                const moveX = Math.cos(angle) * 200;
                const moveY = Math.sin(angle) * 200;

                const newX = Math.max(-200, Math.min(200, moveX));
                const newY = Math.max(-50, Math.min(50, moveY));

                noBtn.style.transform = `translate(${newX}px, ${newY}px)`;
            }
        });

        // Also trigger on hover
        noBtn.addEventListener('mouseenter', function() {
            const randomX = (Math.random() - 0.5) * 400;
            const randomY = (Math.random() - 0.5) * 100;
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });

        // Touch support for mobile devices
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const randomX = (Math.random() - 0.5) * 300;
            const randomY = (Math.random() - 0.5) * 80;
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });

        noBtn.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = noBtn.getBoundingClientRect();
            const btnCenterX = rect.left + rect.width / 2;
            const btnCenterY = rect.top + rect.height / 2;

            const touchX = touch.clientX;
            const touchY = touch.clientY;

            const distance = Math.sqrt(
                Math.pow(touchX - btnCenterX, 2) +
                Math.pow(touchY - btnCenterY, 2)
            );

            // If touch is within 100px, move the button
            if (distance < 100) {
                const angle = Math.atan2(btnCenterY - touchY, btnCenterX - touchX);
                const moveX = Math.cos(angle) * 150;
                const moveY = Math.sin(angle) * 150;

                const newX = Math.max(-200, Math.min(200, moveX));
                const newY = Math.max(-50, Math.min(50, moveY));

                noBtn.style.transform = `translate(${newX}px, ${newY}px)`;
            }
        });

        // Yes button celebration
        yesBtn.addEventListener('click', function() {
            celebration.classList.add('show');
            createHearts();
        });

        function createHearts() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.textContent = ['💕', '💖', '💗', '💓', '💝'][Math.floor(Math.random() * 5)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 2 + 's';
                    heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    heartsContainer.appendChild(heart);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
